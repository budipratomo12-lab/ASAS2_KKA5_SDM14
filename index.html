                    options: [

                    options: [

                        { id: 'b', text: 'Segera memberi tahu temanmu untuk menyembunyikan layar HP-nya demi melindungi keamanan datanya dari pandangan orang lain.', isCorrect: true, feedback: 'Sangat terpuji! Sikap sigap melindungi privasi dan keamanan teman adalah bukti karakter pahlawan digital yang berempati tinggi.' }

            const getBaseUrl = () => {
                if (customBaseUrl.trim() !== '') {
                    let base = customBaseUrl.trim();
                    if (base.endsWith('/')) {
                        base = base.slice(0, -1);
                    }
                    return base;
                }
                return window.location.origin + window.location.pathname;
            };

            const copyShareLink = () => {
                const base = getBaseUrl();
                const linkWithClass = `${base}?kelas=${classCode}`;
                
                const el = document.createElement('textarea');
                el.value = linkWithClass;
                document.body.appendChild(el);

                try {
                    document.execCommand('copy');

            const copySpecificTeacherLink = (teacherCode) => {
                const base = getBaseUrl();
                const linkWithClass = `${base}?kelas=${teacherCode}`;
                
                const el = document.createElement('textarea');
                el.value = linkWithClass;
                document.body.appendChild(el);
                el.select();
                try {
                    document.execCommand('copy');
                    showToast(`Tautan Guru ${teacherCode.toUpperCase()} berhasil disalin!`);
                } catch (err) {
                    console.error("Gagal menyalin link:", err);
                }
                document.body.removeChild(el);
            };

            const exportToCSV = () => {
                if (allStudentProgress.length === 0) return;
                const headers = ['Nama Siswa', 'Kelas/Guru', 'UID', 'Nilai Misi 1', 'Nilai Misi 2', 'Nilai Misi 3', 'Nilai Ujian', 'Rata-Rata Nilai', 'Waktu Update'];
                const rows = allStudentProgress.map(s => {
                    const avg = Math.round(((s.misi1Nilai || 0) + (s.misi2Nilai || 0) + (s.misi3Nilai || 0) + (s.quizScore || 0)) / 4);
                    return [
                        s.name || 'Anonim',
                        s.classCode || classCode,
                        s.uid,
                        s.misi1Nilai !== undefined ? s.misi1Nilai : 0,
                        s.misi2Nilai !== undefined ? s.misi2Nilai : 0,
                        s.misi3Nilai !== undefined ? s.misi3Nilai : 0,
                        s.quizScore !== undefined && s.quizScore !== null ? s.quizScore : '-',
                        avg,
                        s.lastUpdated ? new Date(s.lastUpdated).toLocaleTimeString() : '-'
                    ];
                });
                
                // Menambahkan deklarasi sep=, agar Excel langsung membagi data ke kolom yang benar secara otomatis
                let csvContent = "\uFEFFsep=,\r\n"; 
                csvContent += [headers.join(','), ...rows.map(e => e.map(val => `"${val}"`).join(','))].join('\r\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `rekap_nilai_kelas_${classCode}_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Fungsi untuk menghitung nilai per soal berdasarkan kriteria penilaian baru
            const calculateQuestionScore = (q, ans) => {
                if (ans === undefined || ans === null) {
                    return { score: 0, max: q.type === 'mc' ? 2 : q.type === 'complex_mc' ? 6 : q.type === 'true_false' ? 6 : 4 };
                }
                
                if (q.type === 'mc') {
                    const isCorrect = ans === q.correctAnswer;
                    return { score: isCorrect ? 2 : 0, max: 2, detail: isCorrect ? "Benar" : "Salah" };
                }
                
                if (q.type === 'complex_mc') {
                    if (!Array.isArray(ans)) return { score: 0, max: 6 };
                    // Menghitung berapa pilihan siswa yang masuk dalam daftar kunci jawaban
                    const correctCount = ans.filter(opt => q.correctAnswers.includes(opt)).length;
                    
                    // Pedoman 2: jika salah 1 (benar 2) skor 4, jika salah 2 (benar 1) skor 2, jika salah semua skor 0
                    let score = 0;
                    if (correctCount === 3) score = 6;
                    else if (correctCount === 2) score = 4;
                    else if (correctCount === 1) score = 2;
                    else score = 0;
                    
                    return { score, max: 6, correctCount };
                }
                
                if (q.type === 'true_false') {
                    let correctCount = 0;
                    for (let i = 0; i < 3; i++) {
                        if (ans[i] === q.correctAnswers[i]) {
                            correctCount++;
                        }
                    }
                    
                    // Pedoman 3: jika 3 benar skor 6, jika 2 benar skor 4, jika 1 benar skor 2, jika salah semua skor 0
                    let score = 0;
                    if (correctCount === 3) score = 6;
                    else if (correctCount === 2) score = 4;
                    else if (correctCount === 1) score = 2;
                    else score = 0;
                    
                    return { score, max: 6, correctCount };
                }
                
                if (q.type === 'matching') {
                    let correctCount = 0;
                    for (let i = 0; i < 4; i++) {
                        if (ans[i] === q.correctPairs[i]) {
                            correctCount++;
                        }
                    }
                    
                    // Pedoman 4: Pasangan benar dapat skor maksimal 4, jika ada salah tinggal dikurangi 1 per kesalahan
                    // 4 Benar = 4, 3 Benar = 3, 2 Benar = 2, 1 Benar = 1, 0 Benar = 0
                    const score = correctCount;
                    return { score, max: 4, correctCount };
                }
                return { score: 0, max: 0 };
            };

            const calculateAccumulatedGrade = () => {
                let totalRawScore = 0;
                quizQuestions.forEach((q, idx) => {
                    const ans = quizAnswers[idx];
                    const res = calculateQuestionScore(q, ans);
                    totalRawScore += res.score;
                });
                // Skala maksimal total skor mentah adalah tepat 100
                return totalRawScore;
            };

            const handleSensingMatch = (humanId, robotId) => {
                const selectedRobotItem = sensingData.robot.find(r => r.id === robotId);
                if (selectedRobotItem.matches === humanId) {
                    const matchName = `${sensingData.human.find(h => h.id === humanId).name} ↔️ ${selectedRobotItem.name}`;
                    const newMatches = [...misi1Matches, { humanId, robotId, text: matchName }];
                    setMisi1Matches(newMatches);
                    setMisi1Feedback('Benar! Pasangan serasi! 🎉');
                    
                    // Skala 5 pasang: Setiap pasangan benar bernilai 20 Nilai
                    const currentNilai = newMatches.length * 20;
                    setMisi1Nilai(currentNilai);
                    syncProgressToDb({ misi1Nilai: currentNilai });

                    if (newMatches.length === sensingData.human.length) {
                        setMisi1Completed(true);
                        setMisi1Nilai(100);
                        syncProgressToDb({ 
                            misi1Nilai: 100,
                            misi1Completed: true

            const startAnalysis = (item) => {

            const submitAnalysis = () => {
                const target = analyzedMachine;

                    analysisChecklist.bisaBelajar === target.features.bisaBelajar &&

                if (isCorrectCheck) {
                    setAnalysisFeedback(`Analisis Akurat! Juri AI bangga padamu. ${target.name} memang memiliki sifat ini.`);
                    
                    const category = target.isCerdas ? 'cerdas' : 'biasa';
                    let nextCerdas = sortedItems.cerdas;
                    let nextBiasa = sortedItems.biasa;

                    if (!sortedItems[category].some(i => i.id === target.id)) {
                        if (category === 'cerdas') {
                            nextCerdas = [...sortedItems.cerdas, target];
                        } else {
                            nextBiasa = [...sortedItems.biasa, target];

                        setSortedItems({ cerdas: nextCerdas, biasa: nextBiasa });

                    const totalSorted = nextCerdas.length + nextBiasa.length;

                    let isComplete = false;

                        isComplete = true;

                        misi2Nilai: calculatedNilai,
                        misi2Completed: isComplete
                    });

                } else {
                    setAnalysisFeedback(`Analisis meleset sedikit. Baca deskripsi dan coba telaah ulang sifat asli mesin tersebut! 🧐`);
                }
            };

            const handleSortDirect = (item, category) => {
                if ((category === 'cerdas' && item.isCerdas) || (category === 'biasa' && !item.isCerdas)) {
                    setMisi2Feedback(`Mantap! ${item.name} berhasil dikelompokkan ke kategori ${category === 'cerdas' ? 'Mesin Cerdas (AI)' : 'Mesin Biasa'}.`);
                    
                    const nextCerdas = category === 'cerdas' ? [...sortedItems.cerdas, item] : sortedItems.cerdas;
                    const nextBiasa = category === 'biasa' ? [...sortedItems.biasa, item] : sortedItems.biasa;

            const resetMisi2 = () => {
                setSortedItems({ cerdas: [], biasa: [] });
                setMisi2Feedback('');
                setMisi2Nilai(0);
                setMisi2Completed(false);
                setAnalyzedMachine(null);
            };

            const handleScenarioAnswer = (option) => {
                setScenarioAnswers({
                    ...scenarioAnswers,
                    [currentScenario]: option.id
                });

                if (option.isCorrect) {
                    setMisi3Feedback(`Tindakan Terpuji! ${option.feedback}`);
                } else {

                }

                // Hitung nilai dinamis berdasarkan jumlah jawaban yang BENAR dari 5 Kasus
                const answeredCount = Object.keys({ ...scenarioAnswers, [currentScenario]: option.id }).length;
                let correctCount = 0;
                
                scenarios.forEach((sc, idx) => {
                    const ansId = (idx === currentScenario) ? option.id : scenarioAnswers[idx];
                    if (ansId) {
                        const chosenOpt = sc.options.find(o => o.id === ansId);

                const currentNilai = correctCount * 20; // 5 Soal, @20 nilai
                setMisi3Nilai(currentNilai);

                let isComplete = false;
                if (answeredCount === scenarios.length) {
                    isComplete = true;
                    setMisi3Completed(true);
                }

                syncProgressToDb({
                    misi3Nilai: currentNilai,
                    misi3Completed: isComplete
                });
            };

            const handleQuizAnswer = (answerData) => {
                setQuizAnswers({
                    ...quizAnswers,
                    [currentQuiz]: answerData
                });
            };

            const isCurrentQuestionAnswered = () => {
                const ans = quizAnswers[currentQuiz];
                if (ans === undefined || ans === null) return false;
                const q = quizQuestions[currentQuiz];
                if (q.type === 'complex_mc') return ans.length === 3;
                if (q.type === 'true_false') return Object.keys(ans).length === 3;
                if (q.type === 'matching') return Object.keys(ans).length === 4;

            const startQuest = async () => {

                    setIsRegistered(true);
                    await syncProgressToDb({
                        misi1Nilai: 0,
                        misi2Nilai: 0,
                        misi3Nilai: 0,

            const averageNilaiLive = Math.round(((misi1Nilai || 0) + (misi2Nilai || 0) + (misi3Nilai || 0) + (quizScore || 0)) / 4);

            return (

                                        <span>Nilai Rata-Rata: <strong className="text-indigo-900 text-base font-extrabold">{averageNilaiLive}</strong></span>
                                    </div>
                                )}
                                
                                <button
                                    onClick={() => {
                                        setIsTeacherMode(!isTeacherMode);

                                    }}
                                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-2xl text-xs font-bold flex items-center gap-1.5 transition shadow-sm"
                                >
                                    <Icons.Users className="w-4 h-4 text-white" />

                                </button>
                            </div>
                        </div>
                    </header>

                                                        onClick={() => setCurrentQuiz(prev => prev - 1)}
                                                        className="bg-white hover:bg-gray-50 text-gray-700 font-extrabold py-3 px-5 border rounded-2xl text-xs transition disabled:opacity-40"
                                                    >
                                                        Sebelumnya
                                                    </button>
                                                    <button
                                                        disabled={!isCurrentQuestionAnswered()}
                                                        onClick={handleNextQuiz}
                                                        className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-extrabold py-3 px-6 rounded-2xl text-xs transition flex items-center gap-1 shadow-md"
                                                    >
                                                        {currentQuiz + 1 === quizQuestions.length ? 'Selesai & Kirim Jawaban' : 'Soal Berikutnya'} <Icons.ChevronRight className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            /* HASIL PENILAIAN & SERTIFIKAT DIGITAL + TRANSPARANSI REVIEW SOAL */
                                            <div className="max-w-3xl mx-auto space-y-8 animate-fadeIn">
                                                
                                                {/* Switch Tab Hasil */}
                                                <div className="flex bg-gray-100 p-1.5 rounded-2xl border border-gray-200 max-w-sm mx-auto">
                                                    <button 
                                                        onClick={() => setShowReviewMode(false)}

                                                    >

                                                    </button>
                                                    <button 
                                                        onClick={() => setShowReviewMode(true)} 
                                                        className={`flex-1 py-2 rounded-xl text-xs font-black transition ${showReviewMode ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:text-gray-900'}`}
                                                    >
                                                        🔍 Review Lembar Jawaban
                                                    </button>
                                                </div>

                                                {!showReviewMode ? (
                                                    /* TAMPILAN PIAGAM KELULUSAN */
                                                    <div className="bg-gradient-to-br from-green-50 to-emerald-100 border-8 border-double border-emerald-400 rounded-[36px] p-6 md:p-10 text-center space-y-6 shadow-md relative overflow-hidden">
                                                        <div className="absolute top-0 right-0 w-24 h-24 bg-amber-400 text-amber-955 font-bold flex items-center justify-center rounded-bl-[36px] shadow-sm border-l border-b border-amber-300">
                                                            <Icons.Trophy className="w-10 h-10 text-amber-955 animate-bounce" />
                                                        </div>

                                                        <div className="space-y-1">
                                                            <span className="text-emerald-700 text-xs font-black tracking-widest uppercase">Piagam Kelulusan Kompetensi</span>
                                                            <h3 className="text-2xl md:text-4xl font-extrabold text-emerald-955 font-serif tracking-wide">ALUMNI EXPLORER TEKNOLOGI AI</h3>
                                                            <div className="w-40 h-1 bg-amber-400 mx-auto rounded-full my-3"></div>
                                                        </div>

                                                        <p className="text-xs text-emerald-800 italic">Piagam ini dianugerahkan dengan penuh hormat kepada:</p>

                                                        <div className="py-2.5 border-b-2 border-dashed border-emerald-300 max-w-sm mx-auto">
                                                            <span className="text-2xl md:text-4xl font-black text-indigo-955 font-mono tracking-wider">{studentName}</span>
                                                        </div>

                                                        <p className="text-xs text-emerald-900 leading-relaxed max-w-lg mx-auto">
                                                            Atas keberhasilannya menuntaskan seluruh Misi Eksperimen, memahami perbedaan dasar penginderaan sensor komputer, menganalisis struktur mesin cerdas Kecerdasan Artifisial, serta membuktikan karakter empati terpuji dalam menggunakan teknologi digital.
                                                        </p>

                                                        <div className="grid grid-cols-2 gap-4 max-w-sm mx-auto pt-4 text-xs font-bold text-emerald-900">
                                                            <div className="bg-white/70 border border-emerald-200 p-3 rounded-xl shadow-inner">
                                                                <p className="text-[10px] text-gray-550 font-extrabold uppercase tracking-wider">Nilai Ujian Akhir</p>
                                                                <p className="text-xl text-emerald-955 font-black">{quizScore} / 100</p>
                                                            </div>
                                                            <div className="bg-white/70 border border-emerald-200 p-3 rounded-xl shadow-inner">
                                                                <p className="text-[10px] text-gray-550 font-extrabold uppercase tracking-wider font-mono">Nilai Rata-Rata</p>
                                                                <p className="text-xl text-amber-600 font-black">{averageNilaiLive} / 100</p>
                                                            </div>
                                                        </div>

                                                        <div className="pt-4 text-[10px] text-gray-550">
                                                            Disertifikasi secara digital oleh <strong className="text-emerald-900 font-extrabold">Kurikulum Merdeka Koding Indonesia</strong> pada Tahun 2026.
                                                        </div>
                                                    </div>
                                                ) : (
                                                    /* REVIEW TRANSPARAN JAWABAN SISWA */
                                                    <div className="space-y-6 animate-fadeIn">
                                                        <div className="bg-indigo-50 border border-indigo-200 p-5 rounded-2xl flex justify-between items-center flex-wrap gap-4">
                                                            <div>
                                                                <h3 className="font-extrabold text-indigo-955 text-sm md:text-base flex items-center gap-2">
                                                                    <Icons.BookOpen className="w-5 h-5 text-indigo-600" /> Analisis Transparansi Jawaban Ujian
                                                                </h3>
                                                                <p className="text-xs text-gray-600 mt-1">Tinjauan perolehan skor terperinci sesuai pedoman penskoran resmi.</p>
                                                            </div>
                                                            <div className="bg-white border-2 border-indigo-200 px-4 py-2.5 rounded-xl text-center shadow-sm">
                                                                <span className="text-[9px] uppercase font-black text-gray-400 block">TOTAL AKUMULASI NILAI</span>
                                                                <strong className="text-indigo-950 text-2xl font-black">{quizScore} <span className="text-xs text-gray-450 font-semibold">/ 100</span></strong>
                                                            </div>
                                                        </div>

                                                        <div className="space-y-4 max-h-[650px] overflow-y-auto pr-1">
                                                            {quizQuestions.map((q, idx) => {
                                                                const studentAns = quizAnswers[idx];
                                                                const evalRes = calculateQuestionScore(q, studentAns);
                                                                const isFullyCorrect = evalRes.score === evalRes.max;
                                                                const isPartiallyCorrect = evalRes.score > 0 && evalRes.score < evalRes.max;
                                                                
                                                                return (
                                                                    <div 
                                                                        key={idx} 
                                                                        className={`p-5 rounded-2xl border-2 shadow-sm bg-white transition-all ${
                                                                            isFullyCorrect 
                                                                                ? 'border-emerald-200 hover:border-emerald-300' 
                                                                                : isPartiallyCorrect 
                                                                                    ? 'border-amber-200 hover:border-amber-300' 
                                                                                    : 'border-rose-200 hover:border-rose-300'
                                                                        }`}
                                                                    >
                                                                        <div className="flex items-start justify-between gap-3 flex-wrap">
                                                                            <span className="text-[9px] font-black bg-indigo-50 text-indigo-800 px-2.5 py-1 rounded-full uppercase">
                                                                                SOAL {idx + 1} ({
                                                                                    q.type === 'mc' ? 'PG Biasa (Maks 2)' : 
                                                                                    q.type === 'complex_mc' ? 'PG Kompleks (Maks 6)' : 
                                                                                    q.type === 'true_false' ? 'Benar / Salah (Maks 6)' : 
                                                                                    'Menjodohkan (Maks 4)'
                                                                                })
                                                                            </span>
                                                                            
                                                                            <span className={`text-xs font-black px-3 py-1 rounded-full flex items-center gap-1 ${
                                                                                isFullyCorrect 
                                                                                    ? 'bg-emerald-50 text-emerald-700' 
                                                                                    : isPartiallyCorrect 
                                                                                        ? 'bg-amber-50 text-amber-700' 
                                                                                        : 'bg-rose-50 text-rose-700'
                                                                            }`}>
                                                                                Skor: {evalRes.score} / {evalRes.max}
                                                                            </span>
                                                                        </div>

                                                                        <p className="text-xs md:text-sm font-extrabold text-gray-900 mt-3 leading-relaxed">{q.question}</p>

                                                                        {/* Tampilan Jawaban Siswa & Kunci */}
                                                                        <div className="mt-4 p-3.5 bg-gray-50 rounded-xl space-y-2 text-xs font-semibold">
                                                                            
                                                                            {/* 1. PG Biasa */}
                                                                            {q.type === 'mc' && (
                                                                                <div>
                                                                                    <p className="text-gray-600">Jawaban Kamu: <span className={isFullyCorrect ? 'text-emerald-700' : 'text-rose-700'}>{studentAns !== undefined ? `${String.fromCharCode(65 + studentAns)}. ${q.options[studentAns]}` : 'Belum Dijawab'}</span></p>
                                                                                    {!isFullyCorrect && (
                                                                                        <p className="text-emerald-700 mt-1">Jawaban Benar: <span>{String.fromCharCode(65 + q.correctAnswer)}. {q.options[q.correctAnswer]}</span></p>
                                                                                    )}
                                                                                </div>
                                                                            )}

                                                                            {/* 2. PG Kompleks */}
                                                                            {q.type === 'complex_mc' && (
                                                                                <div className="space-y-1">
                                                                                    <p className="text-gray-600">Pernyataan yang Kamu Pilih:</p>
                                                                                    <ul className="list-disc pl-5 text-gray-700">
                                                                                        {Array.isArray(studentAns) && studentAns.length > 0 ? studentAns.map(optI => {
                                                                                            const isCorrectOption = q.correctAnswers.includes(optI);
                                                                                            return (
                                                                                                <li key={optI} className={isCorrectOption ? "text-emerald-700" : "text-rose-700"}>
                                                                                                    {q.options[optI]} {isCorrectOption ? '✅' : '❌'}
                                                                                                </li>
                                                                                            );
                                                                                        }) : <li className="text-rose-600">Belum ada pilihan</li>}
                                                                                    </ul>
                                                                                    <p className="text-emerald-700 mt-2 font-black">Sistem Penilaian (Salah {3 - (evalRes.correctCount || 0)}): Skor {evalRes.score} / 6</p>
                                                                                </div>
                                                                            )}

                                                                            {/* 3. Benar Salah */}
                                                                            {q.type === 'true_false' && (
                                                                                <div className="space-y-2">
                                                                                    <p className="text-gray-600">Evaluasi Pernyataan:</p>
                                                                                    <ul className="space-y-1 pl-3 text-gray-750">
                                                                                        {q.statements.map((stmt, sIdx) => {
                                                                                            const userVal = studentAns ? studentAns[sIdx] : null;
                                                                                            const correctVal = q.correctAnswers[sIdx];
                                                                                            const isStmtCorrect = userVal === correctVal;
                                                                                            return (
                                                                                                <li key={sIdx} className="flex items-center gap-2">
                                                                                                    <span className={isStmtCorrect ? 'text-emerald-700' : 'text-rose-700'}>
                                                                                                        {isStmtCorrect ? '🟢' : '🔴'} Pernyataan {sIdx + 1}: {userVal === null ? 'Belum Diisi' : userVal ? 'BENAR' : 'SALAH'}
                                                                                                    </span>
                                                                                                    <span className="text-gray-400 font-normal">(Kunci: {correctVal ? 'BENAR' : 'SALAH'})</span>
                                                                                                </li>
                                                                                            );
                                                                                        })}
                                                                                    </ul>
                                                                                    <p className="text-emerald-700 mt-2 font-black">Sistem Penilaian ({evalRes.correctCount || 0} Pernyataan Benar): Skor {evalRes.score} / 6</p>
                                                                                </div>
                                                                            )}

                                                                            {/* 4. Menjodohkan */}
                                                                            {q.type === 'matching' && (
                                                                                <div className="space-y-2">
                                                                                    <p className="text-gray-600">Pasangan yang Kamu Hubungkan:</p>
                                                                                    <ul className="space-y-1 pl-3 text-gray-750">
                                                                                        {q.leftItems.map((leftV, leftI) => {
                                                                                            const userRightVal = studentAns ? studentAns[leftI] : null;
                                                                                            const correctRightVal = q.correctPairs[leftI];
                                                                                            const isMatchCorrect = userRightVal === correctRightVal;
                                                                                            return (
                                                                                                <li key={leftI} className="flex items-center gap-2 flex-wrap">
                                                                                                    <span className={isMatchCorrect ? 'text-emerald-700' : 'text-rose-700'}>
                                                                                                        {isMatchCorrect ? '🟢' : '🔴'} {leftV.split(' (')[0]} ➔ {userRightVal !== null && userRightVal !== undefined ? q.rightItems[userRightVal].split(' (')[0] : 'Kosong'}
                                                                                                    </span>
                                                                                                    {!isMatchCorrect && (
                                                                                                        <span className="text-emerald-600 font-normal">(Seharusnya: {q.rightItems[correctRightVal].split(' (')[0]})</span>
                                                                                                    )}
                                                                                                </li>
                                                                                            );
                                                                                        })}
                                                                                    </ul>
                                                                                    <p className="text-emerald-700 mt-2 font-black font-sans">Sistem Penilaian ({evalRes.correctCount || 0} Pasangan Benar): Skor {evalRes.score} / 4</p>
                                                                                </div>
                                                                            )}

                                                                        </div>

                                                                        {/* Penjelasan Edukatif */}
                                                                        <div className="mt-3 border-t pt-2.5 flex items-start gap-2 text-xs text-gray-600">
                                                                            <Icons.Lightbulb className="w-5 h-5 text-amber-500 shrink-0 mt-0.5" />
                                                                            <p className="leading-relaxed italic">
                                                                                <strong>Penjelasan Juri AI:</strong> {q.explanation}
                                                                            </p>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="bg-white rounded-3xl border p-6 space-y-4 shadow-sm">
                                                    <h4 className="font-extrabold text-gray-900 text-sm flex items-center gap-2">
                                                        <Icons.BookOpen className="w-5 h-5 text-indigo-600" /> Lembar Jurnal Refleksi Nilai Kelas 5:
                                                    </h4>

                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                                                        <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-150">
                                                            <h5 className="font-extrabold text-blue-900 mb-1 flex items-center gap-1">👁️ Padanan Sensor (Misi 1)</h5>
                                                            <p className="text-gray-655 leading-relaxed">Mata biologis sepadan dengan sensor **Kamera LDR**. Telinga sepadan dengan **Sensor Mikrofon**. Kulit sepadan dengan **Ultrasonik**.</p>
                                                        </div>
                                                        <div className="bg-emerald-50/50 p-4 rounded-xl border border-emerald-155">
                                                            <h5 className="font-extrabold text-emerald-955 mb-1 flex items-center gap-1">🧠 Hakikat Mesin AI (Misi 2)</h5>
                                                            <p className="text-emerald-900 leading-relaxed">Mesin biasa bekerja kaku mengikuti program kaku sirkuit, sedangkan mesin berbasis **AI (Kecerdasan Artifisial)** belajar mandiri dari pola data.</p>
                                                        </div>
                                                        <div className="bg-rose-50/50 p-4 rounded-xl border border-rose-150">
                                                            <h5 className="font-extrabold text-rose-955 mb-1 flex items-center gap-1">❤️ Tanggung Jawab (Misi 3)</h5>
                                                            <p className="text-rose-900 leading-relaxed">Komputer boleh memiliki sirkuit cerdas, namun manusia memegang kemudi hati nurani. Selalu gunakan AI dengan jujur dan berempati.</p>
                                                        </div>
                                                    </div>

                                                    <div className="text-center pt-4">
                                                        <button
                                                            onClick={() => {
                                                                setCurrentQuiz(0);
                                                                setQuizAnswers({});
                                                                setQuizSubmitted(false);
                                                                setActiveTab('home');
                                                                setMisi1Matches([]);
                                                                setMisi1Completed(false);
                                                                setMisi2Completed(false);
                                                                setMisi1Nilai(0);
                                                                setMisi2Nilai(0);
                                                                setMisi3Nilai(0);
                                                                setQuizScore(null);
                                                                setSortedItems({ cerdas: [], biasa: [] });
                                                                setShowReviewMode(false);
                                                            }}
                                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 px-6 rounded-2xl text-xs transition flex items-center gap-1.5 mx-auto shadow-md"
                                                        >
                                                            <Icons.RotateCcw className="w-4 h-4" /> Ulangi Rute Petualangan Baru
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* TAB CONTENT: REKAP KELAS */}
                                {activeTab === 'rekap' && (
                                    <div className="bg-white rounded-[32px] p-6 md:p-8 shadow-md border border-indigo-100 space-y-8 animate-fadeIn">
                                        
                                        <div className="border-b border-gray-150 pb-6 space-y-2">
                                            <span className="text-xs font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-200 uppercase tracking-widest">Ruang Kendali Guru</span>
                                            <h2 className="text-2xl md:text-3xl font-black text-indigo-955 flex items-center gap-2">
                                                <Icons.Users className="w-8 h-8 text-indigo-600" /> Pusat Distribusi Guru Kelas 5
                                            </h2>
                                            <p className="text-xs text-gray-500 leading-relaxed max-w-2xl">
                                                Disediakan 4 ruang kelas terisolasi agar guru kelas 5 dapat menggunakan aplikasi ini secara mandiri tanpa khawatir data siswa bercampur. Cukup salin tautan khusus di bawah ini dan berikan kepada siswa masing-masing kelas.
                                            </p>
                                        </div>

                                        {/* PENGATURAN DOMAIN SEKOLAH */}
                                        <div className="bg-amber-50 border border-amber-200 p-5 rounded-3xl space-y-3">
                                            <h4 className="font-extrabold text-sm text-amber-955 flex items-center gap-1.5">
                                                ⚠️ Tips: Mengatasi Link Siswa Tidak Bisa Dibuka
                                            </h4>
                                            <p className="text-xs text-amber-900 leading-relaxed">
                                                Jika Bapak/Ibu menyalin link langsung saat masih dalam mode <strong>Preview Editor</strong>, browser akan memblokir link tersebut karena dianggap sebagai URL sandbox sementara.
                                            </p>
                                            <p className="text-xs text-amber-900 leading-relaxed">
                                                <strong>Solusinya:</strong> Ketikkan alamat website sekolah Bapak/Ibu (tempat file HTML ini diunggah nanti) pada kolom di bawah ini. Jika sudah, tombol salin otomatis akan menggunakan domain sekolah Anda!
                                            </p>
                                            <div className="flex gap-2 max-w-lg mt-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="Contoh: https://sekolahku.sch.id/ai-quest" 
                                                    value={customBaseUrl} 
                                                    onChange={(e) => {
                                                        setCustomBaseUrl(e.target.value);
                                                        localStorage.setItem('custom_base_url', e.target.value);
                                                    }} 
                                                    className="flex-1 px-3 py-2 border rounded-xl text-xs font-semibold focus:outline-indigo-500 shadow-sm bg-white text-indigo-955" 
                                                />
                                                {customBaseUrl && (
                                                    <button 
                                                        onClick={() => {
                                                            setCustomBaseUrl('');
                                                            localStorage.removeItem('custom_base_url');
                                                            showToast("Domain sekolah direset ke default.");
                                                        }}
                                                        className="px-3 py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-xl text-xs font-bold transition"
                                                    >
                                                        Reset
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        {/* GURU CARDS GRID */}
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                            {TEACHERS.map((teacher) => {
                                                const isCurrentActive = classCode === teacher.code;
                                                return (
                                                    <div key={teacher.code} className={`rounded-2xl border-2 p-5 flex flex-col justify-between transition-all ${isCurrentActive ? "bg-indigo-50 border-indigo-500 shadow-md ring-2 ring-indigo-200" : "bg-white border-gray-200 hover:border-indigo-200"}`}>

                                                            <div className={`text-[10px] font-black uppercase px-2 py-0.5 rounded-full inline-block ${teacher.lightColor}`}>{teacher.className}</div>
                                                            <h3 className="font-extrabold text-indigo-955 text-sm md:text-base">{teacher.name}</h3>
                                                            <p className="text-[11px] text-gray-500">Merapikan rekap data & ujian khusus {teacher.className}.</p>
                                                        </div>

                                                        <div className="mt-4 pt-4 border-t border-gray-100 space-y-2">
                                                            <button onClick={() => { setClassCode(teacher.code); showToast(`Berhasil masuk ke Dashboard ${teacher.className}!`); }} className={`w-full py-2 px-3 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 ${isCurrentActive ? "bg-indigo-600 text-white" : "bg-indigo-50 text-indigo-700 hover:bg-indigo-100"}`}>
                                                                <Icons.Eye className="w-3.5 h-3.5" />
                                                                {isCurrentActive ? "Sedang Dipantau" : "Pantau Kelas"}
                                                            </button>
                                                            <button onClick={() => copySpecificTeacherLink(teacher.code)} className="w-full bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 py-1.5 px-3 rounded-xl text-xs font-semibold transition flex items-center justify-center gap-1.5">
                                                                <Icons.Share2 className="w-3.5 h-3.5 text-gray-400" />
                                                                Salin Link Siswa
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {/* LEADERBOARD ZONE */}
                                        <div className="space-y-4 pt-4">
                                            <div className="flex flex-wrap items-center justify-between gap-4 border-b pb-3">
                                                <div>
                                                    <h3 className="text-lg font-black text-indigo-955 flex items-center gap-2">
                                                        📊 Papan Nilai Aktif: <span className="text-indigo-600 uppercase underline">{activeTeacher.className} ({activeTeacher.name})</span>
                                                    </h3>
                                                    <p className="text-xs text-gray-400">Menampilkan real-time data siswa yang terhubung ke kode kelas aktif saat ini.</p>
                                                </div>

                                                <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-150 p-2 rounded-2xl">
                                                    <span className="flex h-3 w-3 relative">
                                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                                                    </span>
                                                    <span className="text-[10px] font-black text-emerald-800 uppercase">Koneksi Awan Aktif ({allStudentProgress.length} Siswa)</span>
                                                </div>
                                            </div>

                                            <div className="flex flex-wrap md:flex-nowrap gap-3 items-center justify-between bg-gray-50 p-4 rounded-2xl border">
                                                <div className="relative flex-1 max-w-md">
                                                    <Icons.Search className="w-4 h-4 absolute left-3 top-3.5 text-gray-400" />
                                                    <input type="text" placeholder="Cari nama siswa..." value={searchFilter} onChange={(e) => setSearchFilter(e.target.value)} className="w-full pl-9 pr-4 py-2 border rounded-xl text-xs font-semibold focus:outline-indigo-500 shadow-sm" />
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    <button onClick={copyShareLink} className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-2 px-4 rounded-xl text-xs flex items-center gap-1.5 transition shadow-sm">
                                                        <Icons.Share2 className="w-4 h-4" />
                                                        <span>{copied ? 'Tautan Tersalin! ✓' : 'Salin Tautan Kelas'}</span>
                                                    </button>
                                                    <button onClick={exportToCSV} disabled={allStudentProgress.length === 0} className="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white font-extrabold py-2 px-4 rounded-xl text-xs flex items-center gap-1.5 transition shadow-sm">
                                                        <Icons.Download className="w-4 h-4" />
                                                        <span>Unduh Rekap (CSV)</span>
                                                    </button>
                                                </div>
                                            </div>

                                            {/* Student Table */}
                                            <div className="overflow-x-auto rounded-2xl border border-gray-200 shadow-sm">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <thead>
                                                        <tr className="bg-indigo-900 text-white font-extrabold uppercase tracking-wider text-[10px]">
                                                            <th className="p-4 border-b border-indigo-950">Nama Siswa</th>
                                                            <th className="p-4 border-b border-indigo-955">ID Unik (UID)</th>
                                                            <th className="p-4 border-b border-indigo-955 text-center">Nilai Misi 1</th>
                                                            <th className="p-4 border-b border-indigo-955 text-center">Nilai Misi 2</th>
                                                            <th className="p-4 border-b border-indigo-955 text-center">Nilai Misi 3</th>
                                                            <th className="p-4 border-b border-indigo-955 text-center">Nilai Ujian</th>
                                                            <th className="p-4 border-b border-indigo-955 text-center">Rata-Rata Nilai</th>
                                                            <th className="p-4 border-b border-indigo-955 text-right font-medium text-[9px] text-indigo-200">Waktu Update</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-200 bg-white font-semibold text-gray-700">
                                                        {filteredStudents.length === 0 ? (
                                                            <tr>
                                                                <td colSpan="8" className="p-8 text-center text-gray-400 italic">Belum ada siswa yang mendaftar atau menyelesaikan misi di kelas ini.</td>
                                                            </tr>
                                                        ) : (
                                                            filteredStudents.map((student) => {
                                                                const avgVal = Math.round(((student.misi1Nilai || 0) + (student.misi2Nilai || 0) + (student.misi3Nilai || 0) + (student.quizScore || 0)) / 4);
                                                                return (
                                                                    <tr key={student.uid} className="hover:bg-indigo-50/30 transition-colors">
                                                                        <td className="p-4 font-bold text-indigo-955 text-sm">{student.name}</td>
                                                                        <td className="p-4 font-mono text-[10px] text-gray-400 select-all">{student.uid}</td>
                                                                        <td className="p-4 text-center font-bold">
                                                                            <span className={`px-2.5 py-1 rounded-full text-[10px] ${student.misi1Nilai >= 80 ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-amber-100 text-amber-850'}`}>{student.misi1Nilai !== undefined ? `${student.misi1Nilai}/100` : '0/100'}</span>
                                                                        </td>
                                                                        <td className="p-4 text-center font-bold">
                                                                            <span className={`px-2.5 py-1 rounded-full text-[10px] ${student.misi2Nilai >= 80 ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-amber-100 text-amber-850'}`}>{student.misi2Nilai !== undefined ? `${student.misi2Nilai}/100` : '0/100'}</span>
                                                                        </td>
                                                                        <td className="p-4 text-center font-bold">
                                                                            <span className={`px-2.5 py-1 rounded-full text-[10px] ${student.misi3Nilai >= 80 ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-amber-100 text-amber-850'}`}>{student.misi3Nilai !== undefined ? `${student.misi3Nilai}/100` : '0/100'}</span>
                                                                        </td>
                                                                        <td className="p-4 text-center font-black text-indigo-900 text-sm">
                                                                            {student.quizScore !== undefined && student.quizScore !== null ? (
                                                                                <span className="bg-indigo-100 border border-indigo-200 text-indigo-800 px-2 py-1 rounded-lg">{student.quizScore}</span>
                                                                            ) : (
                                                                                <span className="text-gray-300">-</span>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-4 text-center">
                                                                            <span className="bg-amber-100 text-amber-900 font-extrabold px-3 py-1 rounded-full border border-amber-300">{avgVal || 0}</span>
                                                                        </td>
                                                                        <td className="p-4 text-right text-[10px] text-gray-400">{student.lastUpdated ? new Date(student.lastUpdated).toLocaleTimeString() : '-'}</td>
                                                                    </tr>
                                                                );
                                                            })
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        {/* INSTRUCTIONS */}
                                        <div className="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100 space-y-3">
                                            <h4 className="font-extrabold text-sm text-indigo-955 flex items-center gap-1.5">💡 Panduan Pemanfaatan Terdistribusi 4 Kelas:</h4>
                                            <ul className="list-disc pl-4 text-xs text-gray-655 space-y-1.5 leading-relaxed">
                                                <li>Berikan link dengan akhiran <code className="bg-indigo-100 px-1 py-0.5 rounded font-mono">?kelas=kelas-isa</code> kepada murid Bu Devika, akhiran <code className="bg-indigo-100 px-1 py-0.5 rounded font-mono">?kelas=kelas-yahya</code> kepada murid Bu Nana, dan seterusnya.</li>
                                                <li>Ketika murid membuka link tersebut, mereka otomatis masuk ke dalam kelas guru masing-masing secara rapi dan tidak akan bercampur di papan kendali guru lainnya.</li>
                                                <li>Setiap guru dapat membuka halaman **Portal Guru** ini dari komputer pendidik untuk mengunduh rekap nilai siswa mereka dalam format CSV/Excel.</li>
                                            </ul>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-indigo-950 text-white py-6 mt-20 border-t-4 border-indigo-900">
                        <div className="max-w-6xl mx-auto px-4 text-center space-y-2">
                            <p className="text-xs md:text-sm">Tercetak di Banjarnegara, Jawa Tengah | Dibuat dengan ❤️ untuk Sekolah Masa Depan Merdeka</p>
                            <p className="text-[10px] text-indigo-300">© 2026 Kementerian Pendidikan, Kebudayaan, Riset, dan Teknologi RI - Kurikulum Koding & Kecerdasan Artifisial Kelas 5</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
